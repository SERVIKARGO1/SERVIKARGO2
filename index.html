  <script>
  // ── PASO 1: Desregistrar TODOS los SW viejos y limpiar caches ────────────
  // Esto evita que un SW viejo intercepte los CDN y sirva versiones rotas
  (function(){
    if(!('serviceWorker' in navigator)) return;
    // Limpiar todos los caches al detectar SW problemático
    if('caches' in window){
      caches.keys().then(function(keys){
        keys.forEach(function(k){ caches.delete(k); });
      });
    }
    // Desregistrar todos los SW (se volverá a registrar el correcto al final)
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){ reg.unregister(); });
      if(regs.length > 0){
        // Si había SW viejos, recargar para asegurar carga fresca de scripts
        // Solo recargar una vez (evitar loop)
        if(!sessionStorage.getItem('jelo_sw_cleared')){
          sessionStorage.setItem('jelo_sw_cleared','1');
          location.reload();
        }
      } else {
        sessionStorage.removeItem('jelo_sw_cleared');
      }
    });
  })();
  </script>

  <script>
    (function(){
      var elapsed = 0;
      var maxWait = 15000; // 15 segundos en total antes de rendirse
      var checkEvery = 500;
      var checker = setInterval(function(){
        elapsed += checkEvery;
        var listo = (typeof React !== 'undefined' && typeof firebase !== 'undefined');
        if(listo){ clearInterval(checker); return; }
        if(elapsed >= maxWait){
          clearInterval(checker);
          var sinInternet = !navigator.onLine;
          var root = document.getElementById('root');
          if(root){
            root.innerHTML =
              '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px;font-family:sans-serif;text-align:center;background:#0A1828">' +

              (sinInternet

                : 'Tenés internet, pero algún recurso tardó demasiado en cargar.<br>Recargá para intentar de nuevo.') +
              '</p>' +
              '<button onclick="sessionStorage.clear();location.reload()" ' +
              'style="background:#D9773F;color:#fff;border:none;padding:14px 32px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(217,119,63,.4)">🔄 Recargar app</button>' +

  <script>
  (function(){
    // ── 1. DESREGISTRAR todos los SW viejos que puedan estar cacheando cosas malas
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(regs){
        regs.forEach(function(reg){
          // Desregistrar cualquier SW que no sea el nuestro externo
          if(reg.scope && !reg.scope.includes('jelo1.github.io')){
            reg.unregister();
          }
        });
      });

      // ── 2. Limpiar TODOS los caches viejos
      if('caches' in window){
        caches.keys().then(function(keys){
          keys.forEach(function(key){
            // Mantener solo el cache actual
            if(key !== 'jelo-v6') caches.delete(key);
          });
        });
      }

      // ── 3. Registrar el SW externo correcto
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('./sw.js', {scope:'./'})
          .then(function(reg){
            console.log('[JELO SW] ✓ scope:', reg.scope);
            reg.addEventListener('updatefound', function(){
              var nw = reg.installing;
              if(!nw) return;
              nw.addEventListener('statechange', function(){
                if(nw.state==='installed' && navigator.serviceWorker.controller){
                  console.log('[SW] Nueva versión disponible');
                }
              });
            });
          })
          .catch(function(e){ console.warn('[SW] Error:', e.message); });
      });
    }

    // ── 4. Install prompt PWA
    var deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e){
      e.preventDefault(); deferredPrompt = e;
      var btn = document.getElementById('pwa-install-fab');
      if(btn) btn.style.display = 'flex';
    });
    window.addEventListener('appinstalled', function(){
      deferredPrompt = null;
      var btn = document.getElementById('pwa-install-fab');
      if(btn) btn.style.display = 'none';
    });
    window.installPWA = function(){
      if(!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
    };

    // ── 5. Modo standalone (instalada como app)
    window.isPWA = (window.matchMedia('(display-mode:standalone)').matches ||
                    window.navigator.standalone === true);
    if(window.isPWA) document.documentElement.classList.add('pwa-mode');

    // ── 6. Indicador online/offline (solo la barra, NO pantalla completa)
    function updateOnline(){
      var bar = document.getElementById('pwa-offline-bar');
      if(bar) bar.style.display = navigator.onLine ? 'none' : 'flex';
    }
    window.addEventListener('online',  updateOnline);
    window.addEventListener('offline', updateOnline);
    // Solo mostrar offline-bar si realmente no hay conexión (con delay para evitar falsos)
    setTimeout(updateOnline, 2000);
  })();
  </script>

// dentro de la ciudad y no confunda direcciones con otras ciudades del país.
const CTG_VIEWBOX = "-75.62,10.20,-75.42,10.50"; // izquierda,abajo,derecha,arriba

async function geocodeAddress(direccionTexto) {
  const query = direccionTexto.trim();
  if (!query) return null;
  const cache = _geoCacheGet();
  const cacheKey = query.toLowerCase();
  if (cache[cacheKey]) return cache[cacheKey]; // ya la buscamos antes

  try {
    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1` + `&countrycodes=co&viewbox=${CTG_VIEWBOX}&bounded=1` + `&q=${encodeURIComponent(query)}`;
    const res = await fetch(url, {
      headers: {
        "Accept-Language": "es"
      }
    });
    const data = await res.json();
    if (data && data[0]) {
      const coords = {
        lat: parseFloat(data[0].lat),
        lng: parseFloat(data[0].lon)
      };
      cache[cacheKey] = coords;
      _geoCacheSet(cache);
      return coords;
    }
  } catch (e) {
    console.warn("Geocodificación falló:", e);
  }
  return null;
}

      fbKey: k

      address: "",
      lat: coords[0],
      lng: coords[1]
    }));
    return [...fijos, ...dinamicos];

      lat: coords[0],
      lng: coords[1]

  }
}

// ── INTERMEDIACIÓN POR ZONA/DISTANCIA (sistema NUEVO — prevalece) ──────────────
// La app cobra una tarifa FIJA al motocarrista por la asignación del viaje,
// según qué tan lejos quede el destino del almacén de recogida (distancia real,
// calculada con las coordenadas geocodificadas). El precio del servicio en sí
// (según peso/volumen/cantidad) lo acuerda el motocarrista directo con el cliente.
// Estos son los valores POR DEFECTO. El administrador puede modificarlos manualmente
// desde el panel (pestaña "Zonas") — el cambio se guarda en Firebase y se aplica
// automáticamente a partir de ese momento, sin tocar código.
const DEFAULT_ZONAS_INTERMEDIACION = [{
  zona: "Zona 1 – Cercana",
  hastaKm: 3,
  valor: 6000,
  color: "#22C55E"
}, {
  zona: "Zona 2 – Media",
  hastaKm: 6,
  valor: 7000,
  color: "#F59E0B"
}, {
  zona: "Zona 3 – Lejana",
  hastaKm: null,
  valor: 8000,
  color: "#D9773F"
} // null = "en adelante" (sin tope)
];
// Copia mutable que usa realmente el cálculo — se actualiza sola cuando el admin
// guarda cambios, o cuando llega un valor distinto desde Firebase.
let ZONAS_ACTUAL = DEFAULT_ZONAS_INTERMEDIACION.map(z => ({
  ...z
}));
function aplicarZonasIntermediacion(nuevas) {
  if (!Array.isArray(nuevas) || !nuevas.length) return;
  // Normaliza: ordena por distancia y asegura que la última zona no tenga tope (Infinity)
  const ordenadas = [...nuevas].sort((a, b) => (a.hastaKm ?? Infinity) - (b.hastaKm ?? Infinity));
  ordenadas[ordenadas.length - 1] = {
    ...ordenadas[ordenadas.length - 1],
    hastaKm: null
  };
  ZONAS_ACTUAL = ordenadas;
}
function distanciaKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const p1 = lat1 * Math.PI / 180,
    p2 = lat2 * Math.PI / 180;
  const dp = (lat2 - lat1) * Math.PI / 180,
    dl = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dp / 2) ** 2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) ** 2;
  return R * 2 * Math.asin(Math.sqrt(a));
}
// Devuelve {valor, zona, km, calculada}. Si faltan coordenadas geocodificadas,
// cae de respaldo al sistema viejo (% sobre la tarifa) para no dejar el cobro en blanco.
function calcIntermediacion(req) {
  const {
    storeLat,
    storeLng,
    destLat,
    destLng
  } = req || {};
  if (storeLat && storeLng && destLat && destLng) {
    const km = distanciaKm(storeLat, storeLng, destLat, destLng);
    const tier = ZONAS_ACTUAL.find(z => z.hastaKm == null || km <= z.hastaKm) || ZONAS_ACTUAL[ZONAS_ACTUAL.length - 1];
    return {
      valor: tier.valor,
      zona: tier.zona,
      km: Math.round(km * 10) / 10,
      color: tier.color,
      calculada: true
    };
  }
  // Respaldo: sin coordenadas, se usa el % de comisión de siempre convertido a valor de referencia
  const com = calcComision(req?.tarifa);
  return {
    valor: com.valor,
    zona: "Sin geolocalizar (comisión " + com.label + ")",
    km: null,
    color: "#94A3B8",
    calculada: false
  };
}

// ── Clasificación rápida cercana/alejada por barrio (para textos de UI en la
// vista del motocarrista). Antes se llamaba a getZonaBarrio() sin que existiera
// en ningún lado del archivo — eso rompía toda la pantalla apenas se abría un
// pedido. Se define acá reutilizando la misma distancia real (distanciaKm) que
// ya usa el sistema de intermediación por zonas, para que sea consistente.
const COM_ZONA_CERCANA = 5000;
const COM_ZONA_ALEJADA = 7000;

// ── POLÍTICA DE CANCELACIONES ───────────────────────────────────────────────
// Tanto clientes como conductores pueden cancelar un servicio. Si cualquiera de
// los dos acumula MÁS de 2 cancelaciones (o sea, a partir de la 3ra), se bloquea
// y debe pagar una penalización para volver a usar la app.
const MAX_CANCELACIONES = 2;
const PENALIZACION_CANCELACION = 5000;
const msgPenalizacionCliente = (nombre, tel) => `🚫 *JELO Cartagena – Cuenta bloqueada*\n\n¡Hola ${nombre || ""}! Cancelaste varios servicios seguidos, así que tu número quedó bloqueado temporalmente para pedir por la app.\n\n💰 *Penalización a pagar:* ${fmtCOP(PENALIZACION_CANCELACION)}\n\n🏦 Transfiere a:\n• Nequi: ${CUENTA_JELO.nequi}\n• Daviplata: ${CUENTA_JELO.daviplata}\n• ${CUENTA_JELO.banco} ${CUENTA_JELO.tipo}: ${CUENTA_JELO.numero}\n\nEnvía el comprobante a este número para reactivar tu cuenta.\n\n_JELO · Cartagena_ 🌴`;
function getZonaBarrio(barrio, lat, lng) {
  // Si tenemos coordenadas GPS reales del destino, calculamos la distancia directo (más preciso).
  if (lat != null && lng != null) {
    const km = distanciaKm(CTG.lat, CTG.lng, lat, lng);
    return km <= 4 ? "cercana" : "alejada";
  }
  if (!barrio) return "alejada";
  const coords = BARRIO_COORDS[barrio];
  if (!coords) return "alejada";
  const km = distanciaKm(CTG.lat, CTG.lng, coords[0], coords[1]);
  return km <= 4 ? "cercana" : "alejada";
}

function DriverApp({

}) {
  const [step, setStep] = React.useState("login"); // login | waiting | active | done
  const [drvData, setDrvData] = React.useState(null); // datos del moto desde Firebase
  const [drvKey, setDrvKey] = React.useState(""); // fbKey del driver
  const [pass, setPass] = React.useState("");
  const [nameIn, setNameIn] = React.useState("");
  const [err, setErr] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [offers, setOffers] = React.useState([]); // solicitudes disponibles
  const [myReq, setMyReq] = React.useState(null); // viaje activo
  const [online, setOnline] = React.useState(false); // disponible/no disponible
  const [locSent, setLocSent] = React.useState(false);
  const [gpsAccuracy, setGpsAccuracy] = React.useState(null); // precisión en metros
  const [gpsSpeed, setGpsSpeed] = React.useState(null); // velocidad m/s
  const [fbConnected, setFbConnected] = React.useState(true); // Firebase online
  const [gpsError, setGpsError] = React.useState(null); // error GPS
  const [pinInput, setPinInput] = React.useState("");
  const [pinError, setPinError] = React.useState("");
  const [pinOk, setPinOk] = React.useState(false);
  const [showPinModal, setShowPinModal] = React.useState(false);
  const mapRef = React.useRef(null);
  const mapInst = React.useRef(null);
  const watchRef = React.useRef(null);

  // ── LOGIN del motocarrista (por número de teléfono registrado) ─────────────
  const doDriverLogin = async () => {
    const tel = nameIn.replace(/\D/g, "");
    if (tel.length < 7) {
      setErr("Ingresa tu número de teléfono registrado");
      return;
    }
    setLoading(true);
    setErr("");
    try {
      await new Promise(r => setTimeout(r, 400));
      const allSnap = await db.ref("drivers").get();
      let key = "",
        data = null;
      if (allSnap.exists()) {
        const entries = Object.entries(allSnap.val() || {});
        // Buscar por teléfono (ignora espacios y guiones)
        const found = entries.find(([k, v]) => {
          const vt = (v.phone || "").replace(/\D/g, "");
          return vt === tel || vt.endsWith(tel) || tel.endsWith(vt);
        });
        if (found) {
          key = found[0];
          data = found[1];
        }
      }
      if (!key) {
        setErr("Número no registrado. Pídele al admin que te registre primero.");
        setLoading(false);
        return;
      }
      // ── Verificar bloqueo por comisión pendiente ──
      if (data.blocked) {
        const comVal = data.comisionPendiente || 0;
        setErr(`🚫 Cuenta bloqueada por comisión pendiente de ${fmtCOP(comVal)}. Paga y pide al admin que te desbloquee.`);
        setLoading(false);
        return;
      }
      setDrvKey(key);
      setDrvData(data);
      setOnline(data.available !== false);
      setStep("waiting");
    } catch (e) {
      setErr("Error de conexión. Verifica tu internet.");
      console.error("Driver login error:", e);
    }
    setLoading(false);
  };

  // ── Listener único post-login — no depende del step ────────
  React.useEffect(() => {
    if (!drvKey) return;
    const ref = db.ref("requests");
    const handler = snap => {
      const all = snap.val() || {};
      const entries = Object.entries(all).map(([k, v]) => ({
        ...v,
        fbKey: k
      }));

      // Viaje activo asignado a este conductor
      const mine = entries.find(r => r.assignedDriverId === drvKey && ["assigned", "transit"].includes(r.status));

      // Solicitudes pendientes disponibles
      const pending = entries.filter(r => r.status === "pending").sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      setOffers(pending);
      if (mine) {
        // Solo cambiar a active si no estamos ya ahí — evitar loops
        setMyReq(prev => {
          // Antes solo comparaba fbKey+status, así que ignoraba cambios en otros campos
          // (ej: cuando el admin fija la intermediación al asignar el viaje) y el
          // conductor se quedaba viendo datos viejos. Ahora se compara el objeto completo.
          if (prev?.fbKey === mine.fbKey && JSON.stringify(prev) === JSON.stringify(mine)) return prev;
          return mine;
        });
        setStep(prev => prev === "done" ? prev : "active");
      }
    };
    ref.on("value", handler);

    // Listener de datos del propio driver
    const dRef = db.ref(`drivers/${drvKey}`);
    dRef.on("value", snap => {
      if (snap.exists()) setDrvData(snap.val());
    });
    return () => {
      ref.off("value", handler);
      dRef.off();

  }, [drvKey]); // Solo depende de drvKey

  // ── Alerta sonora/visual cuando llegan nuevas solicitudes ───
  const prevOfferCount = React.useRef(0);
  const [drvAlert, setDrvAlert] = React.useState(false);
  const [drvAlertMsg, setDrvAlertMsg] = React.useState("");
  React.useEffect(() => {
    if (step !== "waiting" || !online) return;
    if (offers.length > prevOfferCount.current) {
      playAlertSound("new");
      setDrvAlert(true);
      setDrvAlertMsg(`¡${offers.length} viaje${offers.length > 1 ? "s" : ""} disponible${offers.length > 1 ? "s" : ""}!`);
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      setTimeout(() => setDrvAlert(false), 8000);
    }
    prevOfferCount.current = offers.length;

  // ── Aceptar solicitud (modo InDriver: el driver elige) ──────
  const acceptOffer = async req => {
    if (loading) return;
    setLoading(true);
    try {
      const now = new Date().toISOString();
      const driverName = drvData?.name || nameIn || "Conductor";

      // 1. Leer datos completos de la solicitud desde Firebase (incluye PIN)
      const snapReq = await db.ref(`requests/${req.fbKey}`).get();
      const reqCompleto = snapReq.exists() ? {
        ...snapReq.val(),
        fbKey: req.fbKey
      } : req;

      // 2. Escribir asignación en Firebase
      await db.ref(`requests/${req.fbKey}`).update({
        status: "assigned",

        assignedDriverId: drvKey,
        assignedAt: now
      });
      await db.ref(`drivers/${drvKey}`).update({
        available: false
      });

      // 3. Setear estado local con datos COMPLETOS (incluyendo el PIN real)
      const updatedReq = {
        ...reqCompleto,

        assignedDriver: driverName,

        assignedAt: now

      setMyReq(updatedReq);
      setStep("active");

  const compressToMin = file => new Promise((res, rej) => {

    const blobUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        const MAX = 240; // 240px máximo — ~6-12KB resultado
        const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d", {
          willReadFrequently: false
        });
        ctx.drawImage(img, 0, 0, w, h);
        const b64 = canvas.toDataURL("image/jpeg", 0.25); // 25% calidad
        // Liberar TODO antes de resolver
        ctx.clearRect(0, 0, w, h);
        canvas.width = 1;
        canvas.height = 1;
        img.src = "";
        URL.revokeObjectURL(blobUrl);
        res(b64);
      } catch (e) {
        URL.revokeObjectURL(blobUrl);
        rej(e);
      }
    };
    img.onerror = e => {

// ══════════════════════════════════════════════════════════════════════════════
//  ADMIN DASHBOARD
// ══════════════════════════════════════════════════════════════════════════════
function AdminDashboard({
  onLogout
}) {
  const [requests, setRequests] = useState([]);
  const [drivers, setDrivers] = useState([]);
  const [tarifas, setTarifas] = useState(TARIFAS_DEFAULT);
  const [tab, setTab] = useState("requests");
  const [comisiones, setComisiones] = useState([]);
  const [clientesBloqueados, setClientesBloqueados] = useState([]);
  const [filter, setFilter] = useState("all");
  const [typeFilter, setTypeFilter] = useState("all"); // all | motocarro | hogar
  const [newDrv, setNewDrv] = useState({
    name: "",
    phone: "",
    zone: "",
    placa: "",
    photo: ""
  });
  const [editDrv, setEditDrv] = useState(null); // conductor en edición
  const [qrStore, setQrStore] = useState("");
  const [qrUrl, setQrUrl] = useState("");
  const [notif, setNotif] = useState(null);
  const [online, setOnline] = useState(true);
  const [waModal, setWaModal] = useState(null);
  const [cobroModal, setCobroModal] = useState(null);
  const [novModal, setNovModal] = useState(null);
  const [editTarifa, setEditTarifa] = useState(null);
  const [zonas, setZonas] = useState(DEFAULT_ZONAS_INTERMEDIACION);
  const [editZonas, setEditZonas] = useState(false);
  const [zonasDraft, setZonasDraft] = useState(null);

  // ── TÉCNICOS (servicios para el hogar) ──
  const [tecnicos, setTecnicos] = useState([]);
  const [newTec, setNewTec] = useState({
    name: "",
    phone: "",
    categoria: CATEGORIAS_TECNICOS[0].id,
    plan: "basico"
  });
  const [tecFilter, setTecFilter] = useState("all");
  const [newAlert, setNewAlert] = useState(false);
  const [newCount, setNewCount] = useState(0);
  const prevReqIds = useRef(new Set());
  const alertTimer = useRef(null);
  const toast = (msg, ok = true) => {
    setNotif({
      msg,
      ok
    });
    setTimeout(() => setNotif(null), 3500);
  };
  const dismissAlert = () => {
    setNewAlert(false);
    setNewCount(0);
    document.title = "JELO Admin";
    if (alertTimer.current) clearTimeout(alertTimer.current);
  };
  useEffect(() => {
    if (typeof Notification !== 'undefined' && Notification.permission === "default") {
      try {
        Notification.requestPermission();
      } catch (e) {}
    }
    const rRef = db.ref("requests");
    rRef.on("value", snap => {
      const v = snap.val() || {};
      const arr = Object.entries(v).map(([k, r]) => ({
        ...r,
        fbKey: k
      })).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      setRequests(arr);
      // ── Detectar nuevas solicitudes pendientes ──
      const curIds = new Set(arr.filter(r => r.status === "pending").map(r => r.fbKey));
      const added = [...curIds].filter(id => !prevReqIds.current.has(id));
      if (added.length > 0 && prevReqIds.current.size > 0) {
        setNewAlert(true);
        setNewCount(n => n + added.length);
        playAlertSound("new");
        document.title = `🔴 ${added.length} NUEVA SOLICITUD – JELO Admin`;
        sendBrowserNotif("🏍️ JELO – Nueva solicitud", `${added.length} solicitud(es) pendiente(s)`);
        if (alertTimer.current) clearTimeout(alertTimer.current);
        alertTimer.current = setTimeout(dismissAlert, 30000);
      }
      prevReqIds.current = new Set(arr.map(r => r.fbKey));
    });
    const dRef = db.ref("drivers");
    dRef.on("value", snap => {
      const v = snap.val() || {};
      setDrivers(Object.entries(v).map(([k, d]) => ({
        ...d,
        fbKey: k
      })));
    });
    const tRef = db.ref("tarifas");
    tRef.on("value", snap => {
      if (snap.val()) setTarifas(snap.val());
    });
    const zRef = db.ref("zonasIntermediacion");
    zRef.on("value", snap => {
      if (snap.val()) {
        setZonas(snap.val());
        aplicarZonasIntermediacion(snap.val());
      }
    });
    const cRef = db.ref(".info/connected");
    cRef.on("value", snap => setOnline(snap.val() === true));
    // Listener de comisiones
    const comRef = db.ref("comisiones");
    comRef.on("value", snap => {
      const v = snap.val() || {};
      setComisiones(Object.entries(v).map(([k, c]) => ({
        ...c,
        fbKey: k
      })).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
    });
    const tecRef = db.ref("tecnicos");
    tecRef.on("value", snap => {
      const v = snap.val() || {};
      setTecnicos(Object.entries(v).map(([k, t]) => ({
        ...t,
        fbKey: k
      })));
    });
    const cliRef = db.ref("clientes");
    cliRef.on("value", snap => {
      const v = snap.val() || {};
      setClientesBloqueados(Object.entries(v).map(([k, c]) => ({
        ...c,
        fbKey: k
      })).filter(c => c.bloqueado));
    });
    return () => {
      rRef.off();
      dRef.off();
      tRef.off();
      cRef.off();
      comRef.off();
      tecRef.off();
      cliRef.off();
      if (alertTimer.current) clearTimeout(alertTimer.current);
    };
  }, []);
  const getCode = req => req.fbKey?.slice(-6).toUpperCase() || "";

  // ── ACCIONES SOLICITUDES ──
  const markStatus = async (req, status, drvFbKey = null) => {
    const patch = {
      status,
      updatedAt: new Date().toISOString()
    };
    let updReq = {
      ...req,
      ...patch
    };

    // ── Solicitudes de SERVICIOS PARA EL HOGAR (técnicos) ──
    if (req.type === "hogar") {
      if ((status === "delivered" || status === "cancelled") && req.assignedTecId) await fbUpdate(`tecnicos/${req.assignedTecId}`, {
        available: true
      });
      await fbUpdate(`requests/${req.fbKey}`, patch);
      toast("Estado actualizado ✓");
      if (status !== "cancelled") setWaModal({
        req: updReq,
        code: getCode(req),
        status,
        tarifa: 0
      });
      return;
    }

    // ── Solicitudes de MOTOCARRO ──
    if (drvFbKey) {
      const drv = drivers.find(d => d.fbKey === drvFbKey);
      patch.assignedDriver = drv?.name || "";
      patch.assignedDriverId = drvFbKey;
      // Intermediación por zona/distancia: se calcula y queda FIJA en el momento
      // de la asignación (aunque el viaje se cancele después, ya se cobra).
      if (!req.intermediacionFijada) {
        const interm = calcIntermediacion(req);
        patch.intermediacion = interm.valor;
        patch.intermediacionZona = interm.zona;
        patch.intermediacionKm = interm.km;
        patch.intermediacionFijada = true;

        // Registrar la deuda del motocarrista con la app + plazo de 12h para pagar
        const deadlineISO = new Date(Date.now() + 12 * 3600 * 1000).toISOString();
        const code = getCode(req);
        await fbUpdate(`drivers/${drvFbKey}`, {
          comisionPendiente: (drv?.comisionPendiente || 0) + interm.valor,
          ultimaComisionDeadline: deadlineISO,
          ultimaComisionReqKey: req.fbKey
        });
        await fbSet(`comisiones/${req.fbKey}`, {
          drvKey: drvFbKey,
          drvName: drv?.name || "",
          reqKey: req.fbKey,
          code,
          zona: interm.zona,
          km: interm.km,
          comision: interm.valor,
          tipo: "intermediacion_zona",
          deadline: deadlineISO,
          status: "pendiente",
          createdAt: new Date().toISOString()
        });
        // Avisar al motocarrista por WhatsApp cuánto debe pagar por esta asignación.
        // Importante: NO se abre con window.open() aquí directo, porque después de varios
        // `await` el navegador ya no lo considera un clic directo del usuario y bloquea el
        // pop-up en silencio. En su lugar, se muestra un modal con un botón: al hacer clic
        // el admin sí dispara el evento en el momento justo y WhatsApp se abre sin problema.
        if (drv?.phone) {
          setCobroModal({
            drv,
            req: {
              ...req,
              ...patch
            },
            code,
            interm
          });
        }
        // Bloqueo automático a las 12h si sigue pendiente
        setTimeout(async () => {
          const comSnap = await db.ref(`comisiones/${req.fbKey}`).get();
          if (comSnap.exists() && comSnap.val().status === "pendiente") {
            await fbUpdate(`drivers/${drvFbKey}`, {
              blocked: true,
              blockedReason: `Intermediación pendiente #${code} — ${fmtCOP(interm.valor)}`,
              blockedAt: new Date().toISOString(),
              // No se puede abrir WhatsApp automáticamente 12h después (no hay clic de usuario
              // en ese momento). Se deja marcado para que el admin lo envíe con un clic cuando
              // vuelva a abrir el panel — ver aviso "🔔" en la lista de motocarros.
              avisoBloqueoPendiente: true
            });
            await fbUpdate(`comisiones/${req.fbKey}`, {
              status: "bloqueado"
            });
          }
        }, 12 * 3600 * 1000);
      }
      updReq = {
        ...updReq,
        ...patch
      };
      await fbUpdate(`drivers/${drvFbKey}`, {
        available: false
      });
      // stats conductor: sumar viaje
      await fbUpdate(`drivers/${drvFbKey}`, {
        totalViajes: (drv?.totalViajes || 0) + 1,
        ingresos: (drv?.ingresos || 0) + (req.tarifa || 0)
      });
    }
    if ((status === "delivered" || status === "cancelled") && req.assignedDriverId) await fbUpdate(`drivers/${req.assignedDriverId}`, {
      available: true
    });
    await fbUpdate(`requests/${req.fbKey}`, patch);
    toast("Estado actualizado ✓");
    if (status !== "cancelled") {
      // Buscar info del conductor (foto + placa) para incluir en el WA
      const drvInfo = drvFbKey ? drivers.find(d => d.fbKey === drvFbKey) : drivers.find(d => d.fbKey === req.assignedDriverId);
      const trackingUrl = `${window.location.origin}${window.location.pathname}?tracking=${req.fbKey}`;
      setWaModal({
        req: {
          ...updReq,
          trackingUrl
        },
        code: getCode(req),
        status,
        tarifa: req.tarifa || 0,
        drvInfo
      });
    }
  };
  const deleteRequest = async req => {
    if (!window.confirm("¿Eliminar esta solicitud?")) return;
    if (req.assignedDriverId) await fbUpdate(`drivers/${req.assignedDriverId}`, {
      available: true
    });
    if (req.assignedTecId) await fbUpdate(`tecnicos/${req.assignedTecId}`, {
      available: true
    });
    await fbRemove(`requests/${req.fbKey}`);
    toast("Solicitud eliminada");
  };

  // ── TARIFAS (sistema anterior, ya no se usa para el cliente pero se conserva) ──
  const saveTarifa = async (barrio, valor) => {
    const upd = {
      ...tarifas,
      [barrio]: Number(valor)
    };
    setTarifas(upd);
    await fbSet("tarifas", upd);
    toast("Tarifa actualizada ✓");
    setEditTarifa(null);
  };

  // ── ZONAS DE INTERMEDIACIÓN (sistema nuevo) ──
  const saveZonas = async nuevasZonas => {
    // Validación simple: valores numéricos válidos y hasta-km creciente
    for (const z of nuevasZonas) {
      if (!z.valor || Number(z.valor) <= 0) {
        toast("El valor de cada zona debe ser mayor a 0", false);
        return;
      }
    }
    const limpias = nuevasZonas.map((z, i) => ({
      zona: z.zona,
      color: z.color,
      valor: Number(z.valor),
      hastaKm: i === nuevasZonas.length - 1 ? null : Number(z.hastaKm)
    }));
    setZonas(limpias);
    aplicarZonasIntermediacion(limpias); // se aplica de inmediato, sin esperar el round-trip de Firebase
    await fbSet("zonasIntermediacion", limpias);
    toast("Zonas de intermediación actualizadas ✓");
    setEditZonas(false);
  };

  // ── MOTOCARROS ──
  const addDriver = async () => {
    if (!newDrv.name.trim() || !newDrv.phone.trim()) {
      toast("Nombre y teléfono requeridos", false);
      return;
    }
    const data = {
      name: newDrv.name.trim(),
      phone: newDrv.phone.trim(),
      zone: newDrv.zone || "",
      placa: (newDrv.placa || "").toUpperCase().trim(),
      photo: newDrv.photo || "",
      available: true,
      totalViajes: 0,
      ingresos: 0,
      ratingTotal: 0,
      ratingCount: 0,
      ratingAvg: 0,
      createdAt: new Date().toISOString()
    };
    await fbPush("drivers", data);
    setNewDrv({
      name: "",
      phone: "",
      zone: "",
      placa: "",
      photo: ""
    });
    toast("Motocarro registrado ✓");
  };

  // Guardar edición de conductor existente
  const saveEditDrv = async () => {
    if (!editDrv?.fbKey) return;
    const patch = {
      name: (editDrv.name || "").trim(),
      phone: (editDrv.phone || "").trim(),
      zone: editDrv.zone || "",
      placa: (editDrv.placa || "").toUpperCase().trim(),
      photo: editDrv.photo || "",
      updatedAt: new Date().toISOString()
    };
    await fbUpdate(`drivers/${editDrv.fbKey}`, patch);
    setEditDrv(null);
    toast("Conductor actualizado ✓");
  };

  // Convertir imagen a base64 para guardar en Firebase
  const imgToBase64 = (file, maxW = 300) => new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ratio = Math.min(1, maxW / img.width);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        res(canvas.toDataURL("image/jpeg", 0.75));
      };
      img.src = e.target.result;
    };
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
  const toggleDriver = async drv => await fbUpdate(`drivers/${drv.fbKey}`, {
    available: !drv.available
  });
  const deleteDriver = async drv => {
    if (!window.confirm("¿Eliminar?")) return;
    await fbRemove(`drivers/${drv.fbKey}`);
  };

  // ── TÉCNICOS (servicios del hogar) ──
  const addTecnico = async () => {
    if (!newTec.name.trim() || !newTec.phone.trim()) {
      toast("Nombre y teléfono requeridos", false);
      return;
    }
    const data = {
      name: newTec.name.trim(),
      phone: newTec.phone.trim(),
      categoria: newTec.categoria,
      plan: newTec.plan,
      available: true,
      membershipUntil: newTec.plan === "premium" ? new Date(Date.now() + MEMBRESIA_DIAS * 86400000).toISOString() : null,
      totalServicios: 0,
      ingresos: 0,
      comisionesAcumuladas: 0,
      ratingTotal: 0,
      ratingCount: 0,
      ratingAvg: 0,
      createdAt: new Date().toISOString()
    };
    await fbPush("tecnicos", data);
    setNewTec({
      name: "",
      phone: "",
      categoria: CATEGORIAS_TECNICOS[0].id,
      plan: "basico"
    });
    toast("Técnico registrado ✓");
  };
  const toggleTecnico = async t => await fbUpdate(`tecnicos/${t.fbKey}`, {
    available: !t.available
  });
  const deleteTecnico = async t => {
    if (!window.confirm("¿Eliminar este técnico?")) return;
    await fbRemove(`tecnicos/${t.fbKey}`);
  };

  // ── BLOQUEO / DESBLOQUEO ────────────────────────────────────────────────────
  const RAZONES_BLOQUEO = ["Mala conducta con el cliente", "Calificaciones reiteradamente bajas (< 2.5 ⭐)", "Incumplimiento de entregas", "Comisiones sin pagar", "Fraude o manipulación de tarifas", "Otra razón"];
  const bloquearPersona = async (tipo, item) => {
    const razon = window.prompt("¿Por qué razón desea bloquear a " + item.name + "?\n\n" + RAZONES_BLOQUEO.map((r, i) => i + 1 + ". " + r).join("\n") + "\n\nEscriba el número o la razón:");
    if (!razon || !razon.trim()) return;
    const razonFinal = RAZONES_BLOQUEO[Number(razon) - 1] || razon.trim();
    const path = tipo === "driver" ? `drivers/${item.fbKey}` : `tecnicos/${item.fbKey}`;
    await fbUpdate(path, {
      blocked: true,
      blockedReason: razonFinal,
      blockedAt: new Date().toISOString(),
      available: false
    });
    toast(`🚫 ${item.name} bloqueado — "${razonFinal}"`);
  };
  const desbloquearCliente = async c => {
    if (!window.confirm(`¿Confirmas que ${c.nombre || c.phone} ya pagó la penalización y quieres desbloquearlo?`)) return;
    await db.ref(`clientes/${c.fbKey}`).update({
      bloqueado: false,
      bloqueadoReason: null,
      bloqueadoAt: null,
      cancelaciones: 0
    });
    toast(`✅ ${c.nombre || c.phone} desbloqueado`);
  };
  const desbloquearPersona = async (tipo, item) => {
    if (!window.confirm("¿Desbloquear a " + item.name + "? Podrá volver a usar la plataforma.")) return;
    const path = tipo === "driver" ? `drivers/${item.fbKey}` : `tecnicos/${item.fbKey}`;
    await fbUpdate(path, {
      blocked: false,
      blockedReason: null,
      blockedAt: null,
      available: true
    });
    toast(`✅ ${item.name} desbloqueado`);
  };
  // Activar/renovar membresía premium por 30 días desde hoy
  const renovarMembresia = async t => {
    const until = new Date(Date.now() + MEMBRESIA_DIAS * 86400000).toISOString();
    await fbUpdate(`tecnicos/${t.fbKey}`, {
      plan: "premium",
      membershipUntil: until
    });
    toast(`Membresía activada hasta ${new Date(until).toLocaleDateString("es-CO")} ✓`);
  };
  // Pasar a plan básico (cancela premium)
  const pasarABasico = async t => {
    await fbUpdate(`tecnicos/${t.fbKey}`, {
      plan: "basico",
